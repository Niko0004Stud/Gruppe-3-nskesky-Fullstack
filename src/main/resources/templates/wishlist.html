<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>wishlist</title>
    <link rel="stylesheet" th:href="@{/CSS/style.css}">
    <link rel="stylesheet" th:href="@{/CSS/wishlist.css}">
</head>
<body>
<header class="wishlist-header">
    <div class="header-text">
        <h1 th:text="${wishlist.name}"></h1>
    </div>

</header>
<main>
    <div>
        <div class="Wish">
            <div class="square" th:each="wish : ${wishes}">
                <div>
                    <span th:text="${wish.name}"></span>
                    <span th:text="${wish.price}"></span>



                    <form th:action="@{/wish/action}" method="post">
                        <input type="hidden" name="wishId" th:value="${wish.id}" />
                        <input type="hidden" name="wishlistId" th:value="${wishlist.id}" />


                        <button th:if="${isOwner}" name="action" value="delete">
                            Delete
                        </button>


                        <button th:if="${!isOwner and !wish.reserved}" name="action" value="reserve">
                            Reserve
                        </button>

                        <button th:if="${!isOwner and wish.reserved}" disabled>
                            Reserved
                        </button>

                    </form>
                </div>
            </div>
        </div>
    </div>

    <form   th:if="${isOwner}"
            th:action="@{/wishlist/{wishlistId}/createWish(wishlistId=${wishlist.id})}" method="post" id="Wishes">

        <label for="nameField">Ønskets navn:</label>
        <input type="text" id="nameField" name="name" placeholder="Navn på ønske" required>

        <label for="priceField">Pris:</label>
        <input type="number" id="priceField" name="price" placeholder="Pris" required>

        <label for="wishLinkField">Link til ønsket:</label>
        <input type="text" id="wishLinkField" name="url" placeholder="URL til ønske">

        <button type="submit">Tilføj ønske</button>
    </form>
</main>
</body>
</html>
